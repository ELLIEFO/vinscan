<!DOCTYPE html>
<html>
<body>
<input type="file" id="f" accept="image/*" capture="environment">
<div id="out"></div>
<script>
document.getElementById('f').onchange = async function() {
  const file = this.files[0];
  const reader = new FileReader();
  reader.onload = async e => {
    const b64 = e.target.result.split(',')[1];
    const type = file.type || 'image/jpeg';
    document.getElementById('out').textContent = 'Type: ' + type + ' | B64 length: ' + b64.length;
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 100,
        messages: [{role: 'user', content: [
          {type: 'image', source: {type: 'base64', media_type: type, data: b64}},
          {type: 'text', text: 'Décris cette image en une phrase.'}
        ]}]
      })
    });
    const data = await resp.json();
    document.getElementById('out').textContent += ' | Réponse: ' + JSON.stringify(data).substring(0, 200);
  };
  reader.readAsDataURL(file);
};
</script>
</body>
</html>
